<script>

    async function getUserIP(){

    function moveWatermark(id){
        let wm = document.getElementById(id);
        if(!wm) return;
        let box = wm.parentElement;

        function move(){
            const maxX = box.clientWidth - wm.clientWidth - 40;
            const maxY = box.clientHeight - wm.clientHeight - 40;
            wm.style.transition = "all 4s cubic-bezier(0.4, 0, 0.2, 1)";
            wm.style.left = Math.max(20, Math.random() * maxX) + "px";
            wm.style.top = Math.max(20, Math.random() * maxY) + "px";
        }
        move();
        setInterval(move, 6000); 
    }

    function getFileType(url){
        let ext = url.split('.').pop().toLowerCase().split('?')[0];
        if(['jpg','png','jpeg','webp'].includes(ext)) return 'image';
        if(ext==='pdf') return 'pdf';
        return 'video';
    }
    function getFileType(url){

function toggleFullscreen(el){
    if (!document.fullscreenElement) {
        el.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

        let {data:accessData} = await _supabase

    function getDeviceFingerprint(){
    let data = [
        navigator.userAgent,
        navigator.language,
        screen.width + "x" + screen.height,
        new Date().getTimezoneOffset(),
        navigator.platform,
        navigator.hardwareConcurrency || 'cpu',
    ].join("||");

    let hash = 0;
    for (let i = 0; i < data.length; i++) {
        let chr = data.charCodeAt(i);
        hash = ((hash << 5) - hash) + chr;
        hash |= 0;
    }

    return "DEV_" + Math.abs(hash);
}
let lastTap = 0;

function handleDoubleTapUnified(event, el) {
    const currentTime = new Date().getTime();
    const tapLength = currentTime - lastTap;

    if (tapLength < 300 && tapLength > 0) {
        toggleFullscreen(el);
        if (event.type.startsWith("touch")) {
            event.preventDefault(); // يمنع zoom افتراضي على الموبايل
        }
    }

    lastTap = currentTime;
}
